    function getAuthToken() {
        try {
            // Try multiple storage key patterns
            const keys = Object.keys(localStorage).filter(k =>
                k.includes('supabase') || k.includes('auth-token')
            );

            for (const key of keys) {
                try {
                    const data = JSON.parse(localStorage.getItem(key) || '{}');

                    // Check various token locations
                    if (data.access_token) return data.access_token;
                    if (data.currentSession?.access_token) return data.currentSession.access_token;
                    if (data.session?.access_token) return data.session.access_token;
                    if (data.user?.access_token) return data.user.access_token;
                } catch(e) {
                    continue;
                }
            }

            // Fallback: use ANON_KEY for public operations
            console.warn('No auth token found, using anon key');
            return ANON_KEY;
        } catch(e) {
            console.error('Error getting auth token:', e);
            return ANON_KEY;

    // ==========================================

    let PRICING_RULES = {

                PRICING_RULES.sofa.seats = {

                };
                PRICING_RULES.sofa.base = PRICING_RULES.sofa.seats['1'];
                console.log("â Pricing loaded from services.pricing_rules:", PRICING_RULES.sofa.seats);

                // Verify all prices

            // Fallback: try prices table
            const pricesResp = await fetch(`${SUPABASE_URL}/rest/v1/prices?select=sofa_1_seat,sofa_2_seats,sofa_3_seats,sofa_4_seats,sofa_5_seats,sofa_6_seats`, {

            });
            const prices = await pricesResp.json();

            if (prices.length > 0) {
                PRICING_RULES.sofa.seats = {
                    '1': parseFloat(prices[0].sofa_1_seat) || 51,
                    '2': parseFloat(prices[0].sofa_2_seats) || 71,
                    '3': parseFloat(prices[0].sofa_3_seats) || 81,
                    '4': parseFloat(prices[0].sofa_4_seats) || 91,
                    '5': parseFloat(prices[0].sofa_5_seats) || 99,
                    '6': parseFloat(prices[0].sofa_6_seats) || 109
                };
                PRICING_RULES.sofa.base = PRICING_RULES.sofa.seats['1'];
                console.log("â Pricing loaded from prices table:", PRICING_RULES.sofa.seats);
                console.log("â Base price set to:", PRICING_RULES.sofa.base);

                // Verify all prices
                console.log("đ VERIFICATION - All seat prices:");
                for (let i = 1; i <= 6; i++) {
                    console.log(`   ${i} lugar(es): ${PRICING_RULES.sofa.seats[i]}âŹ`);
                }
            }
        } catch(e) {
            console.warn("â ïž Using default pricing rules:", e);
        }
    }
    loadPricingFromSupabase();

    // ==========================================
    // EXTRAS THAT NEED QUANTITY SELECTOR
    // ==========================================
    const QUANTITY_EXTRAS = ['almofadas', 'puffs', 'puffs_xl', 'puffs xl', 'bancos'];
    const extraQuantities = {};

    // ==========================================
    // 1. REMOVE OLD INJECTED SOFĂ CAMA
    // ==========================================
    function removeOldSofaCama() {
        const old = document.getElementById('extra-sofa-cama');
        if (old) old.remove();
    }


    // ==========================================
    // 2. PRICE DISPLAY UPDATE
    // ==========================================
    function updatePriceDisplay() {
        // PRIORITY 1: Check if this is a SOFA service first
        const seatsSpan = document.getElementById('custom-seats-value');
        const hasSeatsControl = seatsSpan !== null;

        if (hasSeatsControl) {
            // This is SOFA - use dedicated sofa calculation
            updateSofaPrice();
            return;
        }

        // PRIORITY 2: Check for per_sqm services (Tapetes, Cortinados, Vidros)
        const widthInput = document.querySelector('input[name="width"]');
        const heightInput = document.querySelector('input[name="height"]');
        const hasLarguraLabel = Array.from(document.querySelectorAll('label')).some(l =>
            l.textContent.includes('Largura') || l.textContent.includes('Comprimento') || l.textContent.includes('Altura')
        );

        if ((widthInput || heightInput || hasLarguraLabel) && widthInput && heightInput) {
            // This is a per_sqm service - calculate properly
            const width = parseFloat(widthInput.value) || 0;
            const height = parseFloat(heightInput.value) || 0;
            const quantitySpan = Array.from(document.querySelectorAll('span')).find(el =>
                /^\d+$/.test(el.innerText) && el.className.includes('text-2xl')
            );
            const quantity = quantitySpan ? parseInt(quantitySpan.innerText) : 1;

            // Get base price from service (check all price displays for the base)
            let basePrice = 0;
            const allText = document.body.innerText;
            if (allText.includes('Tapetes')) basePrice = 12;
            else if (allText.includes('Cortinados')) basePrice = 6.5;
            else if (allText.includes('Vidros')) basePrice = 15;

            if (basePrice > 0 && width > 0 && height > 0) {
                const sqm = width * height;
                const total = (basePrice * sqm * quantity).toFixed(2).replace('.', ',');

                // Update all price displays
                document.querySelectorAll('*').forEach(el => {
                    if (el.children.length === 0 && el.innerText && el.innerText.includes('âŹ')) {
                        const priceRegex = /\d+([.,]\d{2})?\s*âŹ/;
                        if (priceRegex.test(el.innerText)) {
                            const isTotalDisplay = el.closest('.bg-gray-50') ||
                                                 el.className.includes('font-bold') ||
                                                 el.className.includes('text-3xl');
                            const isOptionLabel = el.closest('label');

                            if (isTotalDisplay && !isOptionLabel) {
                                el.innerText = el.innerText.replace(priceRegex, total + ' âŹ');
                            }
                        }
                    }
                });
            }
            return; // Done with per_sqm service
        }

        // PRIORITY 3: Other services (Colchao, etc.)
        const quantitySpan = Array.from(document.querySelectorAll('span')).find(el => /^\d+$/.test(el.innerText) && el.className.includes('text-2xl'));
        if (!quantitySpan) return;

        const quantity = parseInt(quantitySpan.innerText);
        let basePrice = 0;
        let extrasTotal = 0;

        // Check for Colchao
        const selectedSize = document.querySelector('input[name="size"]:checked');
        if (selectedSize) {
            basePrice = selectedSize.value === 'casal' ? PRICING_RULES.colchao.casal : PRICING_RULES.colchao.solteiro;
        }

        // Calculate extras
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            const label = cb.closest('label') || cb.parentElement;
            if (!label) return;
            const container = label.closest('.flex.items-start') || label.closest('[class*="hover:bg-gray"]') || label.parentElement;
            const labelText = (container ? container.innerText : label.innerText).toLowerCase();

            const match = labelText.match(/\+(\d+(?:[.,]\d+)?)\s*âŹ/);
            if (match) {
                let extraPrice = parseFloat(match[1].replace(',', '.'));
                const qtyValueEl = container ? container.querySelector('.sl-extra-qty-value') : null;
                if (qtyValueEl) {
                    const qty = parseInt(qtyValueEl.textContent) || 1;
                    extrasTotal += extraPrice * qty;
                } else {
                    extrasTotal += extraPrice;
                }
            }
        });

        if (basePrice > 0) {
            const total = ((basePrice + extrasTotal) * quantity).toFixed(2).replace('.', ',');
            document.querySelectorAll('*').forEach(el => {
                if (el.children.length === 0 && el.innerText && el.innerText.includes('âŹ')) {
                    const priceRegex = /\d+([.,]\d{2})?\s*âŹ/;
                    if (priceRegex.test(el.innerText)) {
                        const isTotalDisplay = el.closest('.bg-gray-50') ||
                                             el.className.includes('font-bold') ||
                                             el.className.includes('text-3xl');
                        const isOptionLabel = el.closest('label') && (el.closest('.space-y-2') || el.closest('.space-y-4'));
                        const isExtraPrice = el.closest('.sl-extra-qty-control') || el.classList.contains('sl-extra-qty-value');

                        if (isTotalDisplay && !isOptionLabel && !isExtraPrice) {
                            el.innerText = el.innerText.replace(priceRegex, total + ' âŹ');
                        }
                    }
                }
            });
        }
    }

    // ==========================================
    // 2.1. DEDICATED SOFA PRICE CALCULATION
    // ==========================================
    function updateSofaPrice() {
        console.log("đïž Calculating SOFA price...");
        console.log("đ Available pricing rules:", PRICING_RULES.sofa.seats);

        // Get seats value
        const seatsSpan = document.getElementById('custom-seats-value');
        if (!seatsSpan) {
            console.warn("â ïž Seats span not found");
            return;
        }

        const seats = seatsSpan.innerText.trim();
        console.log(`đ„ Seats selected: ${seats} (type: ${typeof seats})`);

        // Get base price for this number of seats
        let basePrice = PRICING_RULES.sofa.seats[seats] || PRICING_RULES.sofa.base;
        console.log(`đ° Base price for ${seats} seats: ${basePrice}âŹ`);
        console.log(`   - PRICING_RULES.sofa.seats['${seats}'] = ${PRICING_RULES.sofa.seats[seats]}`);
        console.log(`   - PRICING_RULES.sofa.base = ${PRICING_RULES.sofa.base}`);

        // Ensure we always have a valid base price
        if (!basePrice || basePrice <= 0) {
            basePrice = PRICING_RULES.sofa.base;
            console.warn(`Using fallback base price: ${basePrice}`);
        }

        // SOFA QUANTITY IS ALWAYS 1 (no quantity control for sofas)
        const quantity = 1;
        console.log(`Quantity: ${quantity} (fixed)`);

        // Calculate extras
        let extrasTotal = 0;
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            const label = cb.closest('label') || cb.parentElement;
            if (!label) return;

            const container = label.closest('.flex.items-start') ||
                            label.closest('[class*="hover:bg-gray"]') ||
                            label.parentElement;
            const labelText = (container ? container.innerText : label.innerText).toLowerCase();

            const match = labelText.match(/\+(\d+(?:[.,]\d+)?)\s*âŹ/);
            if (match) {
                let extraPrice = parseFloat(match[1].replace(',', '.'));
                const qtyValueEl = container ? container.querySelector('.sl-extra-qty-value') : null;

                if (qtyValueEl) {
                    const qty = parseInt(qtyValueEl.textContent) || 1;
                    extrasTotal += extraPrice * qty;
                    console.log(`Extra with quantity: ${extraPrice} x ${qty} = ${extraPrice * qty}`);
                } else {
                    extrasTotal += extraPrice;
                    console.log(`Extra: ${extraPrice}`);
                }
            }
        });

        console.log(`Extras total: ${extrasTotal}`);

        // Calculate final price
        const finalPrice = (basePrice + extrasTotal) * quantity;
        const formattedPrice = finalPrice.toFixed(2).replace('.', ',');
        console.log(`Final price: ${basePrice} + ${extrasTotal} x ${quantity} = ${formattedPrice} âŹ`);

        // Update all total price displays (but not option labels or extra controls)
        let updatedCount = 0;
        const priceElements = [];

        document.querySelectorAll('*').forEach(el => {
            if (el.children.length === 0 && el.innerText && el.innerText.includes('âŹ')) {
                const priceRegex = /\d+([.,]\d{2})?\s*âŹ/;
                if (priceRegex.test(el.innerText)) {
                    const isTotalDisplay = el.closest('.bg-gray-50') ||
                                         el.className.includes('font-bold') ||
                                         el.className.includes('text-3xl');
                    const isOptionLabel = el.closest('label') && (el.closest('.space-y-2') || el.closest('.space-y-4'));
                    const isExtraPrice = el.closest('.sl-extra-qty-control') || el.classList.contains('sl-extra-qty-value');

                    if (isTotalDisplay && !isOptionLabel && !isExtraPrice) {
                        const oldPrice = el.innerText;
                        el.innerText = el.innerText.replace(priceRegex, formattedPrice + ' âŹ');
                        updatedCount++;
                        priceElements.push({
                            element: el.tagName,
                            classes: el.className,
                            oldPrice: oldPrice,
                            newPrice: el.innerText
                        });
                    }
                }
            }
        });

        console.log(`â Updated ${updatedCount} price displays`);
        if (priceElements.length > 0) {
            console.log('đ Updated elements:', priceElements);
        }

        // FORCE UPDATE: Also update ALL elements with prices that might be in summary/resume
        // This catches elements that don't have the specific classes but should still be updated
        setTimeout(() => {
            document.querySelectorAll('*').forEach(el => {
                if (el.children.length === 0 && el.innerText && el.innerText.includes('âŹ')) {
                    const priceRegex = /\d+([.,]\d{2})?\s*âŹ/;
                    if (priceRegex.test(el.innerText)) {
                        // Skip only option labels and extra controls
                        const isOptionLabel = el.closest('label') && (el.closest('.space-y-2') || el.closest('.space-y-4'));
                        const isExtraPrice = el.closest('.sl-extra-qty-control') || el.classList.contains('sl-extra-qty-value');
                        const isSeatLabel = el.closest('label')?.textContent?.includes('Lugar');

                        // Check if this might be a summary/total element
                        const parent = el.parentElement;
                        const isPossibleTotal = parent && (
                            parent.className.includes('bg-') ||
                            parent.className.includes('border') ||
                            parent.className.includes('rounded') ||
                            parent.className.includes('shadow') ||
                            el.className.includes('text-') ||
                            el.innerText.trim().endsWith('âŹ')
                        );

                        if (!isOptionLabel && !isExtraPrice && !isSeatLabel && isPossibleTotal) {
                            const currentPrice = el.innerText.match(priceRegex);
                            if (currentPrice && currentPrice[0] !== formattedPrice + ' âŹ') {
                                console.log(`đ Force updating: "${el.innerText}" -> "${formattedPrice} âŹ"`);
                                el.innerText = el.innerText.replace(priceRegex, formattedPrice + ' âŹ');
                            }
                        }
                    }
                }
            });
        }, 100);
    }

    function transformSeatsToNumeric() {
        // Skip if this is a per_sqm service
        const widthInput = document.querySelector('input[name="width"]');
        const heightInput = document.querySelector('input[name="height"]');
        const hasNumberInputs = document.querySelector('input[type="number"][placeholder*="Ex:"]');

            l.textContent.includes('Largura') || l.textContent.includes('Comprimento')
        );

        if (widthInput || heightInput || hasNumberInputs || hasLarguraLabel) return;

        const seatsContainer = document.querySelector('.space-y-2');
        if (!seatsContainer) return;

        const hasRadios = seatsContainer.querySelector('input[name="seats"]');
        if (!hasRadios) return;
        if (document.getElementById('custom-seats-control')) return;

        const checkedRadio = seatsContainer.querySelector('input[name="seats"]:checked');
        const currentValue = checkedRadio ? checkedRadio.value : "1";

        const numericHTML = `
            <div id="custom-seats-control" class="flex items-center justify-center space-x-4 py-2">
                <button id="btn-seats-minus" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">

                </button>
                <span id="custom-seats-value" class="text-2xl font-bold text-gray-900 min-w-[3rem] text-center">${currentValue}</span>
                <button id="btn-seats-plus" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
                </button>
            </div>
        `;

        const hiddenContainer = document.createElement('div');
        hiddenContainer.id = "hidden-radios";
        hiddenContainer.style.display = "none";

        const radios = Array.from(seatsContainer.querySelectorAll('label'));
        radios.forEach(r => hiddenContainer.appendChild(r));

        seatsContainer.innerHTML = numericHTML;
        seatsContainer.appendChild(hiddenContainer);

        document.getElementById('btn-seats-minus').onclick = (e) => {
            e.preventDefault();
            let val = parseInt(document.getElementById('custom-seats-value').innerText);
            if (val > 1) { val--; updateSeats(val); }
        };

        document.getElementById('btn-seats-plus').onclick = (e) => {
            e.preventDefault();
            let val = parseInt(document.getElementById('custom-seats-value').innerText);
            if (val < 6) { val++; updateSeats(val); }
        };

        function updateSeats(val) {
            console.log(`đ§ Updating seats to: ${val}`);
            document.getElementById('custom-seats-value').innerText = val;
            const radio = hiddenContainer.querySelector(`input[value="${val}"]`);
            if (radio) {
                radio.checked = true;
                radio.dispatchEvent(new Event('change', { bubbles: true }));
                radio.click();
            }
            console.log(`đ Current PRICING_RULES.sofa.seats:`, PRICING_RULES.sofa.seats);
            console.log(`đ° Price for ${val} seats should be: ${PRICING_RULES.sofa.seats[val]}âŹ`);
            updatePriceDisplay();
        }
    }

    // ==========================================
    // 4. ADD QUANTITY CONTROLS TO EXTRAS
    // ==========================================
    function addQuantityToExtras() {
        // Skip if this is a per_sqm service
        const hasLarguraLabel = Array.from(document.querySelectorAll('label')).some(l =>
            l.textContent.includes('Largura') || l.textContent.includes('Comprimento')
        );
        if (hasLarguraLabel) return;

        // Find extras header
        const extrasHeader = Array.from(document.querySelectorAll('h4')).find(h => h.innerText.includes('Extras DisponĂ­veis'));
        if (!extrasHeader) return;

        const extrasContainer = extrasHeader.parentElement;
        if (!extrasContainer) return;

        const extraItems = extrasContainer.querySelectorAll('.flex.items-start');

        extraItems.forEach(item => {
            if (item.querySelector('.sl-extra-qty-control')) return;

            const checkbox = item.querySelector('input[type="checkbox"]');
            if (!checkbox) return;

            const nameEl = item.querySelector('.font-medium');
            if (!nameEl) return;

            const extraName = nameEl.textContent.trim().toLowerCase();

            // Add quantity controls only for almofadas, puffs, bancos (not for service types)
            const needsQty = extraName.includes('almofada') ||
                              extraName.includes('puff') ||
                              extraName.includes('banco');

            if (needsQty) {
                const extraKey = extraName.replace(/\s+/g, '_');
                if (!extraQuantities[extraKey]) extraQuantities[extraKey] = 1;

                const qtyControl = document.createElement('div');
                qtyControl.className = 'sl-extra-qty-control';
                qtyControl.innerHTML = `
                    <button class="sl-extra-qty-btn sl-qty-minus" type="button">â</button>
                    <span class="sl-extra-qty-value">${extraQuantities[extraKey]}</span>
                    <button class="sl-extra-qty-btn sl-qty-plus" type="button">+</button>
                `;

                const priceEl = item.querySelector('[class*="text-[#deb052]"]');
                if (priceEl) {
                    priceEl.parentElement.appendChild(qtyControl);
                } else {
                    const flex1 = item.querySelector('.flex-1');
                    if (flex1) flex1.appendChild(qtyControl);
                }

                qtyControl.style.display = checkbox.checked ? 'inline-flex' : 'none';

                checkbox.addEventListener('change', () => {
                    qtyControl.style.display = checkbox.checked ? 'inline-flex' : 'none';
                    if (!checkbox.checked) {
                        extraQuantities[extraKey] = 1;
                        qtyControl.querySelector('.sl-extra-qty-value').textContent = '1';
                    }
                    updatePriceDisplay();
                });

                qtyControl.querySelector('.sl-qty-minus').onclick = (e) => {
                    e.preventDefault(); e.stopPropagation();
                    let val = extraQuantities[extraKey];
                    if (val > 1) {
                        val--;
                        extraQuantities[extraKey] = val;
                        qtyControl.querySelector('.sl-extra-qty-value').textContent = val;
                        updatePriceDisplay();
                    }
                };

                qtyControl.querySelector('.sl-qty-plus').onclick = (e) => {
                    e.preventDefault(); e.stopPropagation();
                    let val = extraQuantities[extraKey];
                    if (val < 20) {
                        val++;
                        extraQuantities[extraKey] = val;
                        qtyControl.querySelector('.sl-extra-qty-value').textContent = val;
                        updatePriceDisplay();
                    }
                };
            }
        });
    }

        const hasTapeteLabels = Array.from(document.querySelectorAll('label')).some(l =>
            l.textContent.includes('Largura') || l.textContent.includes('Comprimento')
        );
        const hasVidrosLabels = Array.from(document.querySelectorAll('label')).some(l =>

            l.textContent.includes('Tamanho') && !l.textContent.includes('Lugares')

        // Find all h4 headers
        const allHeaders = Array.from(document.querySelectorAll('h4'));

        // For vidros: hide all "EspecificaĂ§Ă”es" headers completely
        if (hasVidrosLabels) {
            const specsHeaders = allHeaders.filter(h => h.innerText.includes('EspecificaĂ§Ă”es'));
            specsHeaders.forEach((header) => {
                header.style.display = 'none';
            });
            return;
        }

        // For colchao: Hide all existing "EspecificaĂ§Ă”es" headers
        const specsHeaders = allHeaders.filter(h => h.innerText.includes('EspecificaĂ§Ă”es'));
        specsHeaders.forEach((header) => {
            if (!header.classList.contains('sl-hide-element')) {
                header.classList.add('sl-hide-element');
            }
        });

        // For colchao: Rename "Extras DisponĂ­veis" to "EspecificaĂ§Ă”es"
        if (hasColchaoLabels) {
            const extrasHeaders = allHeaders.filter(h => h.innerText.includes('Extras DisponĂ­veis'));

                if (extrasHeader.textContent !== 'EspecificaĂ§Ă”es' && !extrasHeader.dataset.slRenamed) {
                    extrasHeader.textContent = 'EspecificaĂ§Ă”es';
                    extrasHeader.dataset.slRenamed = 'true';
                }
            });
        }
    }

    // ==========================================
    function injectAdminSeatsPricingEditor() {
        if (!window.location.pathname.startsWith('/admin')) return;
        if (document.getElementById('sl-seats-editor')) return;
        
        // Find the "Editar ServiĂ§o" modal title
        const editTitle = Array.from(document.querySelectorAll('h2, h3, div')).find(el => {
            return el.children.length === 0 && el.innerText && el.innerText.trim() === 'Editar ServiĂ§o';
        });
        if (!editTitle) return;
        
        // Find the modal container
        const modal = editTitle.closest('[class*="fixed"]');
        if (!modal) return;
        
        // Check if this is the sofa service by finding the slug input
        const slugInput = Array.from(modal.querySelectorAll('input[type="text"]')).find(i => i.value === 'sofa');
        if (!slugInput) return;
        
        // Find the pricing section: div.bg-gray-50.p-4.rounded-lg.space-y-4
        const basePriceInput = Array.from(modal.querySelectorAll('input[type="number"]')).find(inp => {
            const parentText = inp.parentElement?.parentElement?.innerText || '';
            return parentText.includes('PreĂ§o Base') || inp.value === String(PRICING_RULES.sofa.base);
        });
        
        if (!basePriceInput) return;
        
        // Find the pricing section container (bg-gray-50 p-4 rounded-lg space-y-4)
        let pricingSection = basePriceInput.parentElement;
        while (pricingSection && !pricingSection.className.includes('bg-gray-50')) {
            pricingSection = pricingSection.parentElement;
        }
        if (!pricingSection) pricingSection = basePriceInput.parentElement.parentElement.parentElement;
        
        // Create the seats editor
        const editor = document.createElement('div');
        editor.id = 'sl-seats-editor';
        editor.className = 'sl-seats-editor';
        
        const currentSeats = PRICING_RULES.sofa.seats;
        
        editor.innerHTML = `
            <h4>đș PreĂ§os por NĂșmero de Lugares</h4>
            <div class="sl-seats-grid">
                ${[1,2,3,4,5,6].map(n => `
                    <div class="sl-seat-item">
                        <label>${n} ${n === 1 ? 'Lugar' : 'Lugares'}</label>
                        <input type="number" step="0.01" value="${currentSeats[n] || ''}"
                               data-seats="${n}" class="sl-seat-price-input" placeholder="âŹ" />
                    </div>
                `).join('')}
            </div>
            <button class="sl-seats-save-btn" id="sl-save-seats-btn" type="button">
                đŸ Guardar PreĂ§os por Lugares
            </button>
            <div class="sl-seats-status" id="sl-seats-status"></div>
        `;
        
        // Insert after the pricing section
        pricingSection.parentElement.insertBefore(editor, pricingSection.nextSibling);
        
        // Save handler
        document.getElementById('sl-save-seats-btn').onclick = async (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            const statusEl = document.getElementById('sl-seats-status');
            const btn = document.getElementById('sl-save-seats-btn');
            btn.textContent = 'âł A guardar...';
            btn.disabled = true;
            
            const newPrices = {};
            document.querySelectorAll('.sl-seat-price-input').forEach(inp => {
                newPrices[inp.dataset.seats] = parseFloat(inp.value) || 0;
            });
            
            PRICING_RULES.sofa.seats = newPrices;
            
            try {
                const token = getAuthToken();

                const headers = {
                    'apikey': ANON_KEY,
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                };
                
                // Get current service data
                const resp = await fetch(`${SUPABASE_URL}/rest/v1/services?type=eq.sofa&select=id,pricing_rules`, { headers });
                const services = await resp.json();
                
                if (services.length > 0) {
                    const svc = services[0];
                    const updatedRules = { ...svc.pricing_rules, prices_by_seats: newPrices };
                    
                    const updateResp = await fetch(`${SUPABASE_URL}/rest/v1/services?id=eq.${svc.id}`, {
                        method: 'PATCH',
                        headers,
                        body: JSON.stringify({ 
                            pricing_rules: updatedRules,
                            updated_at: new Date().toISOString()
                        })
                    });
                    
                    if (updateResp.ok || updateResp.status === 204) {
                        statusEl.className = 'sl-seats-status success';
                        statusEl.textContent = 'â PreĂ§os por lugares atualizados com sucesso!';
                    } else {
                        throw new Error('Erro HTTP: ' + updateResp.status);
                    }
                }
                
                // Also try to update prices table
                try {
                    const pricesResp = await fetch(`${SUPABASE_URL}/rest/v1/prices?select=id`, { headers });
                    const prices = await pricesResp.json();
                    if (Array.isArray(prices) && prices.length > 0) {
                        await fetch(`${SUPABASE_URL}/rest/v1/prices?id=eq.${prices[0].id}`, {
                            method: 'PATCH',
                            headers,
                            body: JSON.stringify({
                                sofa_1_seat: newPrices['1'],
                                sofa_2_seats: newPrices['2'],
                                sofa_3_seats: newPrices['3'],
                                sofa_4_seats: newPrices['4'],
                                sofa_5_seats: newPrices['5'],
                                sofa_6_seats: newPrices['6'],
                                updated_at: new Date().toISOString()
                            })
                        });
                    }
                } catch(e) { /* prices table may not exist */ }
                
            } catch(err) {
                console.error('Error saving seats prices:', err);
                statusEl.className = 'sl-seats-status error';
                statusEl.textContent = 'â Erro: ' + err.message;
            }
            
            btn.innerHTML = 'đŸ Guardar PreĂ§os por Lugares';
            btn.disabled = false;
            
            setTimeout(() => { statusEl.style.display = 'none'; statusEl.className = 'sl-seats-status'; }, 4000);
        };
    }

    function applyAllCustomizations() {
        // Mark elements being transformed to prevent flash
        const formContainer = document.querySelector('[class*="space-y-6"]') || document.querySelector('form');
        if (formContainer && !formContainer.dataset.slInitialized) {
            formContainer.classList.add('sl-transforming');

        if (!window.location.pathname.startsWith('/admin')) {

            addChairsSpecificationsHeader();

        }

        if (window.location.pathname.startsWith('/admin')) {
            injectAdminSeatsPricingEditor();
            injectAdminExtrasConfig();

        // Mark as ready after transformation
        if (formContainer && !formContainer.dataset.slInitialized) {
            formContainer.classList.remove('sl-transforming');
            formContainer.classList.add('sl-transform-ready');
            formContainer.dataset.slInitialized = 'true';
        }
    }

    // ==========================================
    // MUTATION OBSERVER (faster, no flashing)
    // ==========================================
    const observer = new MutationObserver((mutations) => {
        // Debounce: only run once per batch of mutations
        clearTimeout(window.slCustomizationTimeout);
        window.slCustomizationTimeout = setTimeout(applyAllCustomizations, 50);
    });

    // Start observing
    observer.observe(document.body, {
        childList: true,
        subtree: true
    });

    // Initial run
    applyAllCustomizations();

    // Fallback interval (slower, for edge cases)
    setInterval(applyAllCustomizations, 2000);

    // Listen for all changes that might trigger price updates
    document.addEventListener('click', () => setTimeout(updatePriceDisplay, 100));
    document.addEventListener('change', () => setTimeout(updatePriceDisplay, 100));
    document.addEventListener('input', () => setTimeout(updatePriceDisplay, 150));

    // Additional aggressive update for sofa prices
    setInterval(() => {
        const seatsControl = document.getElementById('custom-seats-value');
        if (seatsControl) {
            // This is a sofa - ensure price is always up to date
            updatePriceDisplay();
        }
    }, 500);
})();
</script>
